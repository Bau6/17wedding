<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель | Свадьба Ивана и Полины</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    .header {
      background: white;
      border-radius: 20px;
      padding: 25px 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    .header h1 {
      color: #333;
      font-size: 28px;
    }
    .header h1 span {
      color: #ff6b6b;
    }
    .stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #f8f9fa;
      padding: 10px 20px;
      border-radius: 15px;
      text-align: center;
    }
    .stat-card .number {
      font-size: 28px;
      font-weight: bold;
      color: #ff6b6b;
    }
    .stat-card .label {
      font-size: 12px;
      color: #666;
    }
    .action-buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5a4fc0;
      transform: translateY(-2px);
    }
    .btn-danger {
      background: #ff6b6b;
      color: white;
    }
    .btn-danger:hover {
      background: #ff5252;
      transform: translateY(-2px);
    }
    .btn-success {
      background: #4CAF50;
      color: white;
    }
    .btn-success:hover {
      background: #45a049;
      transform: translateY(-2px);
    }
    .btn-warning {
      background: #ff9800;
      color: white;
    }
    .btn-warning:hover {
      background: #e68900;
      transform: translateY(-2px);
    }
    .table-container {
      background: white;
      border-radius: 20px;
      overflow-x: auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f8f9fa;
      padding: 15px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #e0e0e0;
      position: sticky;
      top: 0;
    }
    td {
      padding: 12px 15px;
      border-bottom: 1px solid #e0e0e0;
      vertical-align: top;
    }
    tr:hover {
      background: #fef9f0;
    }
    .guest-name {
      font-weight: 600;
      color: #ff6b6b;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-exactly {
      background: #d4edda;
      color: #155724;
    }
    .status-probably {
      background: #fff3cd;
      color: #856404;
    }
    .status-no {
      background: #f8d7da;
      color: #721c24;
    }
    .action-icons {
      display: flex;
      gap: 10px;
    }
    .action-icon {
      cursor: pointer;
      font-size: 18px;
      transition: transform 0.2s;
    }
    .action-icon:hover {
      transform: scale(1.2);
    }
    .edit-icon { color: #667eea; }
    .delete-icon { color: #ff6b6b; }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-content h3 {
      margin-bottom: 20px;
      color: #333;
    }
    .modal-content input,
    .modal-content select,
    .modal-content textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .empty-state {
      text-align: center;
      padding: 60px;
      color: #999;
    }
    .footer {
      margin-top: 30px;
      text-align: center;
      color: white;
      opacity: 0.8;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 24px;
      border-radius: 10px;
      z-index: 1000;
      font-weight: 500;
      animation: fadeInOut 2.5s ease;
    }
    .toast-success { background: #4CAF50; color: white; }
    .toast-error { background: #ff6b6b; color: white; }
    .toast-warning { background: #ff9800; color: white; }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateX(100px); }
      15% { opacity: 1; transform: translateX(0); }
      85% { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(100px); }
    }
    @media (max-width: 768px) {
      th, td {
        font-size: 12px;
        padding: 8px;
      }
      .header {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>👑 Админ-панель <span>Свадьба Ивана и Полины</span></h1>
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="number" id="totalCount">0</div>
        <div class="label">Всего ответов</div>
      </div>
      <div class="stat-card">
        <div class="number" id="exactlyCount">0</div>
        <div class="label">Точно придут</div>
      </div>
      <div class="stat-card">
        <div class="number" id="probablyCount">0</div>
        <div class="label">Возможно</div>
      </div>
      <div class="stat-card">
        <div class="number" id="noCount">0</div>
        <div class="label">Отказы</div>
      </div>
    </div>
  </div>

  <div class="action-buttons">
    <button class="btn btn-success" onclick="downloadJSON()">💾 Скачать JSON</button>
    <button class="btn btn-primary" onclick="copyToClipboard()">📋 Копировать</button>
    <button class="btn btn-warning" onclick="clearAllData()">🗑️ Очистить всё</button>
    <button class="btn btn-primary" onclick="loadData()">🔄 Обновить</button>
  </div>

  <div class="table-container">
    <table id="guestsTable">
      <thead>
      <tr>
        <th>#</th>
        <th>Дата</th>
        <th>Имя</th>
        <th>Статус</th>
        <th>Аллергии</th>
        <th>Еда</th>
        <th>Алкоголь</th>
        <th>Фото</th>
        <th>Сообщение</th>
        <th>Действия</th>
      </tr>
      </thead>
      <tbody id="tableBody">
      <tr>
        <td colspan="10" class="empty-state">⏳ Загрузка...</td>
      </tr>
      </tbody>
    </table>
  </div>
  <div class="footer">
    <p>🔒 Данные хранятся в файле <code>results.json</code> на сервере</p>
  </div>
</div>

<!-- Модальное окно редактирования -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>✏️ Редактирование записи</h3>
    <input type="text" id="editName" placeholder="Имя">
    <select id="editAttendance">
      <option value="exactly">✅ Точно приду</option>
      <option value="probably">🤔 Скорее всего да</option>
      <option value="no">❌ Не приду</option>
    </select>
    <textarea id="editMessage" rows="3" placeholder="Сообщение"></textarea>
    <div class="modal-buttons">
      <button class="btn btn-primary" onclick="saveEdit()">💾 Сохранить</button>
      <button class="btn btn-danger" onclick="closeModal()">Отмена</button>
    </div>
  </div>
</div>

<script>
  let currentEditIndex = null;
  let allGuests = [];

  // ===== ЗАГРУЗКА ДАННЫХ =====
  async function loadData() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '<tr><td colspan="10" class="empty-state">⏳ Загрузка данных...</td></tr>';

    try {
      const response = await fetch('results.json?_=' + Date.now());
      if (!response.ok) throw new Error('Файл не найден');

      const data = await response.json();
      allGuests = Array.isArray(data) ? data : [];
      renderTable();
      updateStats();
      showToast('Данные загружены', 'success');
    } catch (error) {
      // Если файла нет — создаём пустой
      if (error.message.includes('404')) {
        allGuests = [];
        renderTable();
        updateStats();
        showToast('Нет сохранённых данных', 'warning');
      } else {
        tbody.innerHTML = '<tr><td colspan="10" class="empty-state">❌ Ошибка: ' + error.message + '</td></tr>';
        showToast('Ошибка загрузки', 'error');
      }
    }
  }

  // ===== СТАТИСТИКА =====
  function updateStats() {
    const total = allGuests.length;
    const exactly = allGuests.filter(g => g.attendance === 'exactly').length;
    const probably = allGuests.filter(g => g.attendance === 'probably').length;
    const no = allGuests.filter(g => g.attendance === 'no').length;

    document.getElementById('totalCount').textContent = total;
    document.getElementById('exactlyCount').textContent = exactly;
    document.getElementById('probablyCount').textContent = probably;
    document.getElementById('noCount').textContent = no;
  }

  // ===== СТАТУС =====
  function getStatusText(status) {
    const map = {
      'exactly': '<span class="status-badge status-exactly">✅ Точно придёт</span>',
      'probably': '<span class="status-badge status-probably">🤔 Возможно</span>',
      'no': '<span class="status-badge status-no">❌ Не придёт</span>'
    };
    return map[status] || status;
  }

  // ===== ФОРМАТИРОВАНИЕ =====
  function formatAlcohol(arr) {
    if (!arr || !arr.length) return '-';
    const labels = {
      'wine': '🍷 Вино',
      'champagne': '🥂 Шампанское',
      'beer': '🍺 Пиво',
      'whiskey': '🥃 Виски',
      'cognac': '🥃 Коньяк',
      'liqueur': '🍸 Настойка',
      'vodka': '🥃 Водка',
      'no': '🧃 Не пью'
    };
    return arr.map(item => labels[item] || item).join(', ');
  }

  function formatPhoto(value) {
    const map = {
      'yes': '📸 Да!',
      'mood': '😊 По настроению',
      'if': '🤷 Если надо',
      'no': '🚫 Нет'
    };
    return map[value] || value || '-';
  }

  function escapeHtml(text) {
    if (!text) return text;
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ===== РЕНДЕР ТАБЛИЦЫ =====
  function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (!allGuests.length) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty-state">📭 Нет данных. Пригласите гостей заполнить форму!</td></tr>';
      return;
    }

    tbody.innerHTML = allGuests.map((guest, index) => `
      <tr>
        <td>${index + 1}</td>
        <td style="font-size: 12px;">${guest.timestamp || guest.server_timestamp || '-'}</td>
        <td class="guest-name">${escapeHtml(guest.name)}</td>
        <td>${getStatusText(guest.attendance)}</td>
        <td style="max-width: 120px;">${escapeHtml(guest.allergy || '-')}</td>
        <td style="max-width: 120px;">${escapeHtml(guest.food || '-')}</td>
        <td style="max-width: 150px;">${formatAlcohol(guest.alcohol)}</td>
        <td>${formatPhoto(guest.photo)}</td>
        <td style="max-width: 200px;">${escapeHtml(guest.message || '-')}</td>
        <td>
          <div class="action-icons">
            <span class="action-icon edit-icon" onclick="openEditModal(${index})" title="Редактировать">✏️</span>
            <span class="action-icon delete-icon" onclick="deleteGuest(${index})" title="Удалить">🗑️</span>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // ===== УДАЛЕНИЕ =====
  function deleteGuest(index) {
    if (!confirm('Удалить запись?')) return;
    allGuests.splice(index, 1);
    saveToServer();
  }

  // ===== ОЧИСТКА ВСЕХ =====
  function clearAllData() {
    if (!confirm('⚠️ Удалить ВСЕ данные?')) return;
    if (!confirm('Вы уверены?')) return;
    allGuests = [];
    saveToServer();
  }

  // ===== СОХРАНЕНИЕ НА СЕРВЕР =====
  async function saveToServer() {
    try {
      const response = await fetch('save.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(allGuests)
      });
      const result = await response.json();
      if (result.success) {
        renderTable();
        updateStats();
        showToast('Сохранено!', 'success');
      } else {
        showToast('Ошибка: ' + (result.error || 'неизвестная'), 'error');
      }
    } catch (error) {
      showToast('Ошибка соединения', 'error');
    }
  }

  // ===== РЕДАКТИРОВАНИЕ =====
  function openEditModal(index) {
    const guest = allGuests[index];
    if (!guest) return;
    currentEditIndex = index;
    document.getElementById('editName').value = guest.name || '';
    document.getElementById('editAttendance').value = guest.attendance || 'exactly';
    document.getElementById('editMessage').value = guest.message || '';
    document.getElementById('editModal').style.display = 'flex';
  }

  function saveEdit() {
    if (currentEditIndex === null) return;
    allGuests[currentEditIndex] = {
      ...allGuests[currentEditIndex],
      name: document.getElementById('editName').value.trim(),
      attendance: document.getElementById('editAttendance').value,
      message: document.getElementById('editMessage').value.trim(),
      editedAt: new Date().toLocaleString('ru-RU')
    };
    closeModal();
    saveToServer();
  }

  function closeModal() {
    document.getElementById('editModal').style.display = 'none';
    currentEditIndex = null;
  }

  // ===== СКАЧАТЬ JSON =====
  function downloadJSON() {
    const blob = new Blob([JSON.stringify(allGuests, null, 2)], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `guests_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('JSON скачан', 'success');
  }

  // ===== КОПИРОВАТЬ =====
  async function copyToClipboard() {
    try {
      await navigator.clipboard.writeText(JSON.stringify(allGuests, null, 2));
      showToast('Скопировано!', 'success');
    } catch(e) {
      alert('Не удалось скопировать');
    }
  }

  // ===== ТОСТ =====
  function showToast(message, type) {
    const toast = document.createElement('div');
    toast.textContent = message;
    toast.className = 'toast toast-' + (type || 'success');
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  // ===== ЗАКРЫТИЕ МОДАЛКИ ПО КЛИКУ ВНЕ =====
  window.onclick = function(event) {
    if (event.target === document.getElementById('editModal')) {
      closeModal();
    }
  };

  // ===== ЗАПУСК =====
  loadData();
</script>
</body>
</html>
